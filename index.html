<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pranav</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    color: #111;
  }

  nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 64px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    z-index: 10;
    border-bottom: 1px solid #eee;
  }

  nav a {
    text-decoration: none;
    color: #333;
    font-weight: 500;
  }

  nav a:hover {
    color: #000;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  section {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding-top: 64px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  h1 {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .content {
    max-width: 800px;
    padding: 2rem;
    font-size: 1.2rem;
    line-height: 1.6;
  }
</style>
</head>
